name: Build and push image

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-push:
    runs-on: docker

    container:
      image: "code.forgejo.org/oci/node:24-trixie"

    steps:
      - name: Install dependencies
        run: |
          apt-get -qq update
          apt-get -qq install -q docker-cli

      - name: Sanitize repository name
        id: repository
        run: |
          echo "value=${FORGEJO_SERVER_URL/https:\/\//}" >> "$FORGEJO_OUTPUT"

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to local registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.repository.outputs.value }}
          username: ${{ env.FORGEJO_REPOSITORY_OWNER }}
          password: ${{ secrets.LOCAL_REGISTRY_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.repository.outputs.value }}/${{ env.FORGEJO_REPOSITORY }}
          tags: |
            # See: https://github.com/docker/metadata-action?tab=readme-ov-file#semver
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
