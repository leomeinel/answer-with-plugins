name: Build and push container image to local registry

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-push:
    runs-on: docker

    container:
      image: "code.forgejo.org/oci/node:22-trixie"

    steps:
      - name: Install docker-cli
        run: |
          apt-get -qq update
          apt-get -qq install -q docker-cli

      - name: Sanitize the name of the repository
        id: repository
        run: |
          echo "value=${FORGEJO_SERVER_URL/https:\/\//}" >> "$FORGEJO_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to local registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.repository.outputs.value }}
          username: ${{ env.FORGEJO_REPOSITORY_OWNER }}
          password: ${{ secrets.LOCAL_REGISTRY_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FORGEJO_REPOSITORY }}
          flavor: |
            latest=auto
            prefix=${{ steps.repository.outputs.value }}/,onlatest=true
          tags: |
            # See: https://github.com/docker/metadata-action?tab=readme-ov-file#semver
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
